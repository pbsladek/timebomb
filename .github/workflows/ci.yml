name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: all jobs get read-only access.
# Individual jobs that need nothing more inherit this.
permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install stable toolchain
        run: |
          set -euo pipefail
          rustup update stable
          rustup default stable
          rustup component add rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install stable toolchain
        run: |
          set -euo pipefail
          rustup update stable
          rustup default stable
          rustup component add clippy
      - uses: actions/cache@6849a6489940f00c2f30cb149f03af631c37399 # v4.1.2
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install stable toolchain
        run: rustup update stable && rustup default stable
      - uses: actions/cache@6849a6489940f00c2f30cb149f03af631c37399 # v4.1.2
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-unit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-unit-
            ${{ runner.os }}-cargo-
      - name: Run unit tests (lib + bins only)
        # --lib --bins runs only the inline #[cfg(test)] modules, not tests/
        run: cargo test --lib --bins --verbose

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install stable toolchain
        run: rustup update stable && rustup default stable
      - uses: actions/cache@6849a6489940f00c2f30cb149f03af631c37399 # v4.1.2
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-
            ${{ runner.os }}-cargo-
      - name: Run integration tests (tests/ directory)
        # --tests runs only the files under tests/ (scanner_tests, config_tests)
        run: cargo test --tests --verbose

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests, integration-tests, clippy]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install stable toolchain
        run: rustup update stable && rustup default stable
      - uses: actions/cache@6849a6489940f00c2f30cb149f03af631c37399 # v4.1.2
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-smoke-
            ${{ runner.os }}-cargo-
      - name: Build release binary
        run: cargo build --release
      - name: Smoke — check exits 0 on empty directory
        run: |
          set -euo pipefail
          mkdir -p "${{ runner.temp }}/smoke-empty"
          ./target/release/timebomb check "${{ runner.temp }}/smoke-empty"
      - name: Smoke — list always exits 0 even with expired annotation
        run: |
          set -euo pipefail
          mkdir -p "${{ runner.temp }}/smoke-list"
          echo "// TODO[2020-01-01]: expired annotation" > "${{ runner.temp }}/smoke-list/test.rs"
          ./target/release/timebomb list "${{ runner.temp }}/smoke-list"
      - name: Smoke — check exits 1 when expired annotation found
        run: |
          set -euo pipefail
          mkdir -p "${{ runner.temp }}/smoke-expired"
          echo "// TODO[2020-01-01]: this is expired" > "${{ runner.temp }}/smoke-expired/main.rs"
          if ./target/release/timebomb check "${{ runner.temp }}/smoke-expired"; then
            echo "ERROR: expected exit 1 for expired annotation" && exit 1
          fi
      - name: Smoke — JSON output is valid JSON
        run: |
          set -euo pipefail
          mkdir -p "${{ runner.temp }}/smoke-json"
          echo "// FIXME[2020-01-01]: old" > "${{ runner.temp }}/smoke-json/lib.rs"
          ./target/release/timebomb check "${{ runner.temp }}/smoke-json" --format json | python3 -m json.tool > /dev/null
      - name: Smoke — GitHub Actions format emits workflow commands
        run: |
          set -euo pipefail
          mkdir -p "${{ runner.temp }}/smoke-gh"
          echo "// TODO[2020-01-01]: expired annotation" > "${{ runner.temp }}/smoke-gh/main.rs"
          output=$(./target/release/timebomb check "${{ runner.temp }}/smoke-gh" --format github || true)
          echo "$output" | grep -q "::error" || (echo "Expected ::error annotation" && exit 1)

  self-check:
    name: Self Check (timebomb scans itself)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [smoke-tests]
    # Informational only — fixture files contain deliberately past-dated annotations.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install stable toolchain
        run: rustup update stable && rustup default stable
      - uses: actions/cache@6849a6489940f00c2f30cb149f03af631c37399 # v4.1.2
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-smoke-
            ${{ runner.os }}-cargo-
      - name: Build release binary
        run: cargo build --release
      - name: Scan src/ with GitHub Actions format
        run: ./target/release/timebomb check ./src --format github || true
      - name: List all annotations sorted by date
        run: ./target/release/timebomb list ./src || true
