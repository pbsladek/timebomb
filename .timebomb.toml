# timebomb configuration — scans the timebomb codebase itself.
# All fields are optional; omitting a field uses the built-in default.

# Tags to scan for. Matched case-insensitively.
#
# Default: ["TODO", "FIXME", "HACK", "TEMP", "REMOVEME", "DEBT", "STOPSHIP",
#           "WORKAROUND", "DEPRECATED", "BUG"]
triggers = [
  "TODO", "FIXME", "HACK", "TEMP", "REMOVEME",
  "DEBT", "STOPSHIP", "WORKAROUND", "DEPRECATED", "BUG",
]

# Flag fuses expiring within this many days as ticking.
# 0 disables the ticking window entirely.
#
# Default: 0
fuse_days = 14

# Glob patterns excluded from scanning, matched against the path relative to
# the scan root.
#
# Default: ["vendor/**", "node_modules/**", "*.min.js", ".git/**"]
exclude = [
  "vendor/**",
  "node_modules/**",
  "*.min.js",
  ".git/**",
  "target/**",
]

# File extensions to scan. Empty list means all non-binary files.
#
# Default: rs, go, ts, js, py, rb, java, cs, fs, hs, php, clj, lisp, rkt,
#          ex, erl, c, cpp, d, swift, ml, lua, dart, kt, sql, tf, yaml, yml
extensions = [
  "rs",
  "toml",
  "yaml",
  "yml",
  "sh",
  "md",
]
