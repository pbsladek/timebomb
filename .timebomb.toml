# timebomb configuration file
# Place this file in the root of your project.
#
# All fields are optional — omitting a field uses the built-in default.

# Trigger tags to scan for. Only fuses whose tag appears in this list will be
# reported. Tags are matched case-insensitively, but stored uppercased.
#
# Default: ["TODO", "FIXME", "HACK", "TEMP", "REMOVEME"]
triggers = ["TODO", "FIXME", "HACK", "TEMP", "REMOVEME"]

# Warn (and optionally fail with --fail-on-ticking) if a fuse's deadline is
# within this many days. Set to 0 to disable the ticking window.
#
# Default: 0
fuse_days = 14

# Glob patterns for paths to exclude from scanning. Patterns are matched
# against the path relative to the scan root. Use ** for recursive matching.
#
# Default: ["vendor/**", "node_modules/**", "*.min.js", ".git/**"]
exclude = [
  "vendor/**",
  "node_modules/**",
  "*.min.js",
  ".git/**",
  "target/**",
  "dist/**",
  "build/**",
]

# File extensions to scan. If this list is empty, timebomb will attempt to
# scan all files that aren't detected as binary (i.e. contain no null bytes
# in the first 8 KB). Add or remove extensions to match your tech stack.
#
# Default: ["rs", "go", "ts", "js", "py", "rb", "java", "sql", "tf", "yaml", "yml"]
extensions = [
  "rs",
  "go",
  "ts",
  "js",
  "py",
  "rb",
  "java",
  "sql",
  "tf",
  "yaml",
  "yml",
  "toml",
  "sh",
  "bash",
  "zsh",
  "md",
  "swift",
  "kt",
  "scala",
  "cs",
  "cpp",
  "c",
  "h",
]
